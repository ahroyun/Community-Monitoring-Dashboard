<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LINE Games Community Radar</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Community Radar</p>
          <h1>게임 커뮤니티 실시간 동향</h1>
        </div>
        <div class="actions">
          <label class="search">
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="키워드, 게임, 커뮤니티">
          </label>
          <div class="refresh-box">
            <button id="exportButton" type="button" title="2주 데이터 엑셀 내보내기">
              <span class="icon">↓</span>
              2주 내보내기
            </button>
            <button id="refreshButton" type="button" title="새로고침">
              <span class="icon">↻</span>
              새로고침
            </button>
            <span id="refreshTime" class="refresh-time">마지막 갱신 -</span>
          </div>
        </div>
      </header>

      <section class="insight-strip" id="insightCards" aria-label="커뮤니티 인사이트"></section>

      <section class="heatmap-section">
        <div class="heatmap-head">
          <div>
            <h2 style="margin-top:0">키워드 히트맵</h2>
            <p class="hint">게임별 이슈 키워드 집중도 (2주 기준)</p>
          </div>
        </div>
        <div id="heatmapPanel"></div>
      </section>

      <section class="workspace">
        <aside class="left-panel">
          <div class="panel-head">
            <h2>게임</h2>
            <button id="clearFilters" type="button">전체</button>
          </div>
          <div id="gameFilters" class="filter-list"></div>

          <h2>감지 키워드</h2>
          <div id="keywordCloud" class="keyword-cloud"></div>

          <h2>감성 신호</h2>
          <p class="hint">제목 키워드 기반의 참고 신호입니다.</p>
          <div class="sentiment-bars">
            <div class="sent-row">
              <span class="sent-label">긍정</span>
              <div class="bar-track"><div class="bar-fill pos-fill" id="positiveMeter" style="width:0%"></div></div>
              <span class="bar-pct" id="positivePct">0%</span>
            </div>
            <div class="sent-row">
              <span class="sent-label">중립</span>
              <div class="bar-track"><div class="bar-fill neu-fill" id="neutralMeter" style="width:0%"></div></div>
              <span class="bar-pct" id="neutralPct">0%</span>
            </div>
            <div class="sent-row">
              <span class="sent-label">주의</span>
              <div class="bar-track"><div class="bar-fill neg-fill" id="negativeMeter" style="width:0%"></div></div>
              <span class="bar-pct" id="negativePct">0%</span>
            </div>
          </div>

          <details class="source-memo">
            <summary>수집 소스</summary>
            <ul>
              <li><b>대항해시대 오리진</b><br>FLOOR 자유게시판 / 네이버 카페 자유·건의 게시판 / DC</li>
              <li><b>언디셈버</b><br>FLOOR 자유게시판 / DC</li>
              <li><b>창세기전 모바일</b><br>게임라운지 자유 게시판·건의사항·오류제보 / DC</li>
            </ul>
          </details>
        </aside>

        <section class="feed-area">
          <div class="feed-toolbar">
            <div class="tabs" id="sourceTabs"></div>
            <label class="toggle">
              <input id="onlyAlerts" type="checkbox">
              <span>이슈 키워드만</span>
            </label>
          </div>
          <div id="notice" class="notice" hidden></div>
          <div id="feed" class="feed"></div>
        </section>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
