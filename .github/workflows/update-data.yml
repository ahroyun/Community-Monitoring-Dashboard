name: Update community data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch community data
        run: node scripts/fetch-data.js

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          git diff --staged --quiet || git commit -m "chore: update community data"
          for i in 1 2 3 4 5; do
            git pull --no-rebase -X ours origin main && git push && break
            echo "Push failed, retrying in 10s ($i/5)..."
            sleep 10
          done
